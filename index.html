<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Moldura Alta Qualidade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;height:100vh;overflow:hidden;font-family:Arial}
h2{position:absolute;top:15px;width:100%;text-align:center;color:#fff;z-index:20;font-size:18px}
#camera{width:100%;height:100vh;object-fit:cover;transform:scaleX(-1);image-rendering:-webkit-optimize-contrast;image-rendering:high-quality}
#moldura{position:absolute;top:0;left:0;width:100%;height:100%;z-index:15;pointer-events:none}
.botoes{position:absolute;bottom:40px;width:100%;text-align:center;z-index:20}
button{padding:12px 28px;font-size:17px;border-radius:30px;border:none;background:#2196F3;color:white;margin:0 10px;font-weight:bold}
</style>
</head>
<body>
<h2>📸 Foto em Alta Qualidade</h2>
<video id="camera" autoplay playsinline muted></video>
<img id="moldura" src="moldura.png" alt="Moldura">
<div class="botoes">
<button onclick="tirarFoto()">📸 Tirar Foto</button>
<button onclick="location.reload()">🔄 Nova</button>
</div>
<canvas id="foto" width="1080" height="1920" style="display:none"></canvas>

<script>
const camera = document.getElementById('camera');
const canvas = document.getElementById('foto');
const ctx = canvas.getContext('2d');

// ✅ FORÇA 1080p FULL HD
navigator.mediaDevices.getUserMedia({
  video: {
    facingMode: 'user',
    width: {ideal: 1080, min:720, max:1920},
    height: {ideal: 1920, min:1280, max:2560},
    frameRate: {ideal:30}
  }
})
.then(stream => {camera.srcObject = stream; camera.play()})
.catch(() => alert('Permita acesso à câmera!'));

function tirarFoto(){
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(camera, 0, 0, 1080, 1920);
  const moldura = new Image();
  moldura.crossOrigin = 'anonymous';
  moldura.src = 'moldura.png';
  moldura.onload = () => {
    ctx.drawImage(moldura, 0, 0, 1080, 1920);
    const link = document.createElement('a');
    link.download = 'foto_alta_qualidade.png';
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();
  }
}
</script>
</body>
</html>
