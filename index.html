<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moldura - Resolução 1080p</title>
<style>
* {margin: 0; padding: 0; box-sizing: border-box;}
body {background: #000; height: 100vh; overflow: hidden; font-family: Arial, sans-serif;}

/* Câmera: resolução nativa 1080p, encaixe exato na moldura */
#camera {
  position: absolute;
  top: 24%;
  left: 8%;
  width: 84%;
  height: 48%;
  object-fit: cover;
  transform: scaleX(-1);
  image-rendering: -webkit-optimize-contrast;
  image-rendering: high-quality;
  filter: brightness(1.05) contrast(1.08) saturate(1.1);
}
#camera.traseira {transform: scale(1);}

#moldura {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 15;
  pointer-events: none;
}

.botoes {
  position: absolute;
  bottom: 4%;
  width: 100%;
  text-align: center;
  z-index: 20;
}

button {
  padding: 12px 20px;
  font-size: 15px;
  border: none;
  border-radius: 30px;
  background: #ff69b4;
  color: white;
  margin: 0 6px;
  font-weight: bold;
}
button.gravando {
  background: #e53935;
  animation: piscar 1.2s infinite;
}
@keyframes piscar {0%{opacity:1;} 50%{opacity:0.7;} 100%{opacity:1;}}

#canal, #foto {display: none;}
</style>
</head>
<body>

<video id="camera" autoplay playsinline muted></video>
<canvas id="canal" width="1080" height="1920"></canvas>
<img id="moldura" src="moldura.png" alt="Moldura">

<div class="botoes">
  <button onclick="tirarFoto()">📸 Foto</button>
  <button id="btnGravar" onclick="alternarGravacao()">🎥 Gravar</button>
  <button onclick="alternarCamera()">🔄 Virar</button>
</div>

<canvas id="foto" width="1080" height="1920"></canvas>

<script>
const camera = document.getElementById('camera');
const canal = document.getElementById('canal');
const ctxCanal = canal.getContext('2d', { willReadFrequently: true });
const canvasFoto = document.getElementById('foto');
const ctxFoto = canvasFoto.getContext('2d', { willReadFrequently: true });

let camAtual = 'user';
let gravando = false;
let mediaRecorder;
let blocos = [];

// ✅ Resolução IGUAL ao modelo: 1080×1920 nativo
function iniciarCamera(tipo) {
  if (camera.srcObject) {
    camera.srcObject.getTracks().forEach(trilha => trilha.stop());
  }
  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: tipo,
      width: { ideal: 1080, min: 1080, max: 1920 },
      height: { ideal: 1920, min: 1920, max: 2560 },
      frameRate: { ideal: 30, min: 24 }
    },
    audio: true
  })
  .then(stream => {
    camera.srcObject = stream;
    camera.play();
    camera.classList.toggle('traseira', tipo === 'environment');
    desenharQuadro();
  })
  .catch(() => alert('Permita o uso da câmera e microfone!'));
}

// Desenha mantendo resolução máxima e encaixe exato
function desenharQuadro() {
  ctxCanal.clearRect(0, 0, 1080, 1920);
  // Posição e tamanho fixos para a moldura
  ctxCanal.drawImage(camera, 86, 460, 908, 920, 0, 0, 1080, 1920);

  // Suavização leve sem perder nitidez
  const dados = ctxCanal.getImageData(0, 0, 1080, 1920);
  const pixels = dados.data;
  for (let i = 0; i < pixels.length; i += 4) {
    pixels[i]     = Math.min(255, pixels[i] * 1.03);
    pixels[i + 1] = Math.min(255, pixels[i + 1] * 1.02);
    pixels[i + 2] = Math.min(255, pixels[i + 2] * 1.01);
  }
  ctxCanal.putImageData(dados, 0, 0);

  // Coloca a moldura por cima
  ctxCanal.drawImage(document.getElementById('moldura'), 0, 0, 1080, 1920);

  if (!gravando) requestAnimationFrame(desenharQuadro);
}

function alternarCamera() {
  camAtual = camAtual === 'user' ? 'environment' : 'user';
  iniciarCamera(camAtual);
}

function tirarFoto() {
  ctxFoto.imageSmoothingEnabled = true;
  ctxFoto.imageSmoothingQuality = 'high';
  ctxFoto.drawImage(canal, 0, 0);
  const link = document.createElement('a');
  link.download = 'foto_com_moldura.png';
  link.href = canvasFoto.toDataURL('image/png', 1.0);
  link.click();
}

function alternarGravacao() {
  if (!gravando) {
    blocos = [];
    const streamGravacao = canal.captureStream(30);
    try {
      mediaRecorder = new MediaRecorder(streamGravacao, {
        mimeType: 'video/webm; codecs=vp9',
        videoBitsPerSecond: 5000000 // mesma taxa de qualidade do modelo
      });
    } catch (e) {
      mediaRecorder = new MediaRecorder(streamGravacao, {
        mimeType: 'video/webm; codecs=vp8'
      });
    }
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) blocos.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(blocos, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'video_com_moldura.webm';
      link.click();
      URL.revokeObjectURL(url);
    };
    mediaRecorder.start(1000);
    gravando = true;
    document.getElementById('btnGravar').textContent = '⏹️ Parar';
    document.getElementById('btnGravar').classList.add('gravando');
  } else {
    mediaRecorder.stop();
    gravando = false;
    document.getElementById('btnGravar').textContent = '🎥 Gravar';
    document.getElementById('btnGravar').classList.remove('gravando');
    desenharQuadro();
  }
}

window.addEventListener('load', () => iniciarCamera(camAtual));
</script>

</body>
</html>
