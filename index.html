<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Moldura Foto e Vídeo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;height:100vh;overflow:hidden;font-family:Arial}
#camera{width:100%;height:100vh;object-fit:contain;transform:scaleX(-1) scale(0.9);transform-origin:center;image-rendering:high-quality;filter:brightness(1.08) contrast(1.05) saturate(1.1)}
#camera.traseira{transform:scale(0.9)}
#moldura{position:absolute;top:0;left:0;width:100%;height:100%;z-index:15;pointer-events:none}
.botoes{position:absolute;bottom:30px;width:100%;text-align:center;z-index:20}
button{padding:12px 16px;font-size:15px;border-radius:30px;border:none;background:#ff69b4;color:white;margin:0 5px;font-weight:bold}
button.gravando{background:#e53935;animation:pulsar 1.2s infinite}
@keyframes pulsar{0%{opacity:1}50%{opacity:0.7}100%{opacity:1}}
</style>
</head>
<body>
<video id="camera" autoplay playsinline muted></video>
<canvas id="canal" width="1080" height="1920" style="display:none"></canvas>
<img id="moldura" src="moldura.png" alt="Moldura">
<div class="botoes">
<button onclick="tirarFoto()">📸 Foto</button>
<button id="btnGravar" onclick="alternarGravacao()">🎥 Gravar</button>
<button onclick="alternarCamera()">🔄 Virar</button>
</div>
<canvas id="foto" width="1080" height="1920" style="display:none"></canvas>

<script>
const camera = document.getElementById('camera');
const canal = document.getElementById('canal');
const ctxCanal = canal.getContext('2d', {willReadFrequently:true});
const canvas = document.getElementById('foto');
const ctx = canvas.getContext('2d', {willReadFrequently:true});
let camAtual = 'user', gravando = false, mediaRecorder, chunks=[];

function iniciarCamera(tipo){
  if(camera.srcObject) camera.srcObject.getTracks().forEach(t=>t.stop());
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:tipo,width:{ideal:1080,min:720},height:{ideal:1920,min:1280},frameRate:{ideal:30}},
    audio:true
  })
  .then(stream=>{camera.srcObject=stream;camera.play();camera.classList.toggle('traseira',tipo==='environment');iniciarCanal();})
  .catch(()=>alert('Permita câmera e microfone!'));
}

function iniciarCanal(){
  if(window.atualizarCanal) cancelAnimationFrame(window.atualizarCanal);
  function desenhar(){
    ctxCanal.clearRect(0,0,1080,1920);
    ctxCanal.drawImage(camera,60,160,960,1600,0,0,1080,1920);
    aplicarSuavizacao(ctxCanal);
    ctxCanal.drawImage(document.getElementById('moldura'),0,0,1080,1920);
    window.atualizarCanal = requestAnimationFrame(desenhar);
  }
  desenhar();
}

function aplicarSuavizacao(contexto){
  const imgData = contexto.getImageData(0,0,1080,1920);
  const dados = imgData.data;
  for(let i=0;i<dados.length;i+=4){
    const r=dados[i],g=dados[i+1],b=dados[i+2];
    dados[i] = Math.min(255, r*1.05); dados[i+1] = Math.min(255, g*1.03); dados[i+2] = Math.min(255, b*1.02);
  }
  contexto.putImageData(imgData,0,0);
}

function alternarCamera(){camAtual=camAtual==='user'?'environment':'user';iniciarCamera(camAtual);}
window.onload=()=>iniciarCamera(camAtual);

function tirarFoto(){
  ctx.drawImage(canal,0,0);
  const link=document.createElement('a');
  link.download='foto_moldura.png';
  link.href=canvas.toDataURL('image/png',1.0);
  link.click();
}

function alternarGravacao(){
  if(!gravando){
    chunks=[];
    const stream = canal.captureStream(30);
    mediaRecorder = new MediaRecorder(stream,{mimeType:'video/webm; codecs=vp9'});
    mediaRecorder.ondataavailable=e=>chunks.push(e.data);
    mediaRecorder.onstop=()=>{
      const blob=new Blob(chunks,{type:'video/webm'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='video_moldura.webm';a.click();
      URL.revokeObjectURL(url);
    };
    mediaRecorder.start();
    gravando=true;document.getElementById('btnGravar').textContent='⏹️ Parar';
    document.getElementById('btnGravar').classList.add('gravando');
  }else{
    mediaRecorder.stop();gravando=false;
    document.getElementById('btnGravar').textContent='🎥 Gravar';
    document.getElementById('btnGravar').classList.remove('gravando');
  }
}
</script>
</body>
</html>
