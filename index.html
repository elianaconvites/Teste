<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Moldura Teste</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;height:100vh;overflow:hidden;font-family:Arial}
h2{position:absolute;top:15px;width:100%;text-align:center;color:#fff;z-index:10}
#camera{width:100%;height:100vh;object-fit:cover;transform:scaleX(-1)}
#moldura{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none}
.botoes{position:absolute;bottom:40px;width:100%;text-align:center;z-index:10}
button{padding:12px 24px;font-size:16px;border-radius:30px;border:none;background:#2196F3;color:white;margin:0 8px}
</style>
</head>
<body>
<h2>📸 Encaixe e tire sua foto!</h2>
<video id="camera" autoplay playsinline></video>
<img id="moldura" src="moldura.png" alt="Moldura">
<div class="botoes">
<button onclick="tirarFoto()">📸 Tirar Foto</button>
<button onclick="location.reload()">🔄 Nova</button>
</div>
<canvas id="foto" style="display:none"></canvas>
<script>
const camera=document.getElementById('camera');
navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:1080,height:1920}})
.then(s=>{camera.srcObject=s;camera.play()})
.catch(e=>alert('Permita a câmera!'));
function tirarFoto(){
const c=document.getElementById('foto'),ctx=c.getContext('2d');
c.width=1080;c.height=1920;ctx.drawImage(camera,0,0,1080,1920);
const m=new Image();m.crossOrigin="anonymous";m.src="moldura.png";
m.onload=()=>{ctx.drawImage(m,0,0,1080,1920);const a=document.createElement('a');a.download="foto_teste.png";a.href=c.toDataURL("image/png");a.click();}
}
</script>
</body>
</html>
